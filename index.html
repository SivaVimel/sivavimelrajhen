<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="The digital persona of Siva Vimel Rajhen — self-taught engineer, AI builder, founder of DigitalOman.ai." />
  <meta name="theme-color" content="#000000" />
  <title>Siva Vimel Rajhen</title>
  <link rel="preconnect" href="https://digitaloman.ai" crossorigin />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/" aria-label="Home">
      <span class="brand-name">Siva Vimel Rajhen</span>
    </a>

    <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
      <svg class="icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4" />
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
      </svg>
      <svg class="icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
      </svg>
    </button>
  </header>

  <main class="app">
    <!-- HERO (initial Google-style centered input) -->
    <section id="hero" class="hero" aria-label="Welcome">
      <div class="hero-inner">
        <h1 class="title">Hey, I'm Siva.</h1>
        <p class="subtitle">My digital persona. Ask me about my journey, what I've built, or what I can build for you.</p>

        <form id="heroForm" class="composer composer-hero" autocomplete="off">
          <textarea
            id="heroInput"
            class="composer-input"
            placeholder="Ask me anything…"
            rows="1"
            maxlength="2000"
            aria-label="Message"
          ></textarea>
          <button type="submit" class="composer-send" aria-label="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M5 12h14M13 6l6 6-6 6" />
            </svg>
          </button>
        </form>

        <div class="suggestions" aria-label="Suggestions">
          <button class="chip" data-prompt="Tell me about DigitalOman.ai and how you built it.">DigitalOman.ai story</button>
          <button class="chip" data-prompt="What's your background and how did you get into AI?">Your background</button>
          <button class="chip" data-prompt="What can you build, and what stack do you use?">What you build</button>
          <button class="chip" data-prompt="Are you open to a job, freelance, or partnership?">Hire / partner</button>
        </div>
      </div>
    </section>

    <!-- CHAT (after first message) -->
    <section id="chat" class="chat hidden" aria-label="Conversation">
      <div id="messages" class="messages" role="log" aria-live="polite"></div>

      <div class="composer-wrap">
        <form id="chatForm" class="composer composer-chat" autocomplete="off">
          <textarea
            id="chatInput"
            class="composer-input"
            placeholder="Reply to Siva…"
            rows="1"
            maxlength="2000"
            aria-label="Message"
          ></textarea>
          <button type="submit" class="composer-send" aria-label="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M5 12h14M13 6l6 6-6 6" />
            </svg>
          </button>
        </form>
        <p class="footnote">Responses are generated by an AI persona of Siva. Personal experiences are real; phrasing is generated.</p>
      </div>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
